<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外小店</title>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const button = document.querySelector('[data-action="doSomething"]');
            button.addEventListener('click', function() {
                // Your JavaScript functionality
                if(button.classList.contains('active')) {
                    console.log('Button is active');
                } else {
                    console.log('Button is not active');
                }
            });
        });
    </script>
</head>
<body>
    <h1>欢迎来到海外小店!</h1>
    <button data-action="doSomething" class="active">点击我</button>
</body>
</html>
