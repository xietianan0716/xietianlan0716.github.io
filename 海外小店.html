<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外小店</title>
    <style>
        :root {
            --klein-blue: #002FA7;
            --bg-color: #FDFBF7;
            --text-main: #333333;
            --text-muted: #888888;
            --card-bg: #FFFFFF;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 4rem 1rem 2rem;
        }

        h1 {
            color: var(--klein-blue);
            font-size: 2.5rem;
            margin-bottom: 1rem;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .subtitle {
            color: var(--text-main);
            font-size: 1.1rem;
            background: rgba(0, 47, 167, 0.06);
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1000px;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            width: 100%;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 1.8rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid rgba(0, 47, 167, 0.04);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 30px rgba(0, 47, 167, 0.08);
        }

        .product-name {
            font-size: 1.15rem;
            font-weight: 500;
            line-height: 1.5;
            margin-bottom: 0.5rem;
        }

        .price {
            font-size: 1.8rem;
            color: var(--klein-blue);
            font-weight: bold;
            margin: 1rem 0 1.5rem;
        }
        
        .price span {
            font-size: 1rem;
            font-weight: normal;
        }

        .buy-btn {
            background-color: var(--klein-blue);
            color: white;
            border: none;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            letter-spacing: 1px;
        }

        .buy-btn:hover {
            opacity: 0.85;
            box-shadow: 0 4px 12px rgba(0, 47, 167, 0.2);
        }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            z-index: 100;
            opacity: 0;
            transition: opacity 0.3s ease;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 20px;
            text-align: center;
            max-width: 320px;
            width: 80%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            position: relative;
        }

        .modal-overlay.show {
            display: flex;
            opacity: 1;
        }

        .modal-overlay.show .modal-content {
            transform: translateY(0);
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.8rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .qr-image {
            width: 100%;
            max-width: 220px;
            border-radius: 12px;
            margin: 1.2rem 0 0.5rem;
        }

        .modal-text {
            font-size: 1.05rem;
            color: var(--text-main);
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .highlight-text {
            color: var(--klein-blue);
            font-weight: 600;
            font-size: 1.15rem;
        }

        .contact-info {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            text-align: left;
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--text-main);
        }

        .contact-info span {
            color: var(--klein-blue);
            font-weight: 500;
            user-select: all; /* 方便客人长按复制 */
        }

        .wechat-name {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 1rem;
            letter-spacing: 1px;
        }

        footer {
            margin-top: auto;
            padding: 3rem 1rem 2rem;
            color: var(--text-muted);
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <h1>海外小店</h1>
    <div class="subtitle">✨ 均有售后，请安心选购</div>
</header>

<div class="container" id="product-list">
    </div>

<div class="modal-overlay" id="qr-modal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-btn" onclick="closeModal()">×</span>
        
        <div class="modal-text">
            您正在选购<br>
            <span class="highlight-text" id="modal-product-name"></span>
        </div>
        
        <img src="wechat-qr.jpg" alt="扫码添加客服" class="qr-image" onerror="this.style.display='none'">
        
        <div class="contact-info">
            微信号 1：<span>17671346816</span><br>
            微信号 2：<span>qazxcvf123</span>
        </div>

        <div class="wechat-name">
            ( 何处繁华笙歌落 )
        </div>
    </div>
</div>

<footer>
    <p>© 2026 海外小店. All rights reserved.</p>
</footer>

<script>
    const products = [
        { name: '美区苹果 ID', price: '15' },
        { name: '美区 ID (带小火箭)', price: '59' },
        { name: 'Gemini 学生成品账号', price: '69' },
        { name: 'Gemini 非学生成品账号', price: '99' },
        { name: 'Gemini 掉资格重新订阅 (一年)', price: '89' },
        { name: 'Gemini 3个月订阅', price: '25' },
        { name: 'Claude Pro (6个月)', price: '450' },
        { name: 'TG 账号', price: '15' }
    ];

    const container = document.getElementById('product-list');
    const modal = document.getElementById('qr-modal');
    const modalProductName = document.getElementById('modal-product-name');

    products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div>
                <div class="product-name">${product.name}</div>
                <div class="price"><span>¥</span> ${product.price}</div>
            </div>
            <button class="buy-btn" onclick="openModal('${product.name}')">选择商品</button>
        `;
        container.appendChild(card);
    });

    function openModal(productName) {
        modalProductName.innerText = productName;
        modal.style.display = 'flex';
        setTimeout(() => {
            modal.classList.add('show');
        }, 10);
    }

    function closeModal(event) {
        if (event && event.target !== modal && event.target.className !== 'close-btn') {
            return;
        }
        modal.classList.remove('show');
        setTimeout(() => {
            modal.style.display = 'none';
        }, 300);
    }
</script>

</body>
</html>
